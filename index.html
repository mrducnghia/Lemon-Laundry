<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Review</title>

<style>

body{

font-family: Arial, sans-serif;
text-align:center;

background-image:url("nen.png");
background-size:cover;
background-position:center;

margin:0;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

/* khung chính */

.container{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

padding:30px 25px;
border-radius:20px;

width:90%;
max-width:380px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

/* logo */

.logo img{

width:160px;
max-width:80%;
margin-bottom:10px;

}

/* địa chỉ */

.address{

color:#555;
margin-bottom:25px;
font-size:14px;

}

/* tiêu đề */

.title{

font-size:22px;
margin-bottom:25px;
font-weight:600;

}

/* sao */

.stars{

font-size:42px;
letter-spacing:8px;

}

/* sao mặc định */

.star{

color:#ddd;
cursor:pointer;
transition:0.2s;

}

/* sao khi hover */

.star:hover{

transform:scale(1.2);

}

/* sao được chọn */

.star.active{

color:#00BFFF;

}

.note{

margin-top:25px;
font-size:13px;
color:#666;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Logotachnen.png" alt="Lemon Laundry">
</div>

<div class="address">
142 Đặng Vũ Hỷ
</div>

<div class="title">
Bạn hài lòng với dịch vụ của chúng tôi?
</div>

<div class="stars">

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<div class="note">
Cảm ơn bạn đã giúp Lemon Laundry cải thiện dịch vụ ❤️
</div>

</div>

<script>

function rate(stars){

let allStars = document.querySelectorAll(".star");

allStars.forEach((star,index)=>{

if(index < stars){

star.classList.add("active");

}else{

star.classList.remove("active");

}

});

setTimeout(()=>{

if(stars <=3){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSfQucXNqQpD7xyTg_6Q4zE8XOKr0HuMWQzPeawKJUI_WBIIbg/viewform";

}else{

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

},500);

}

</script>

</body>

</html>
