<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00BFFF">

<title>Lemon Laundry Review</title>

<style>

body{

font-family: Arial, sans-serif;
text-align:center;

background-image:url("nen.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin:0;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

/* khung nội dung */

.container{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

padding:35px 30px;
border-radius:22px;

width:92%;
max-width:440px;

box-shadow:0 15px 40px rgba(0,0,0,0.18);

}

/* logo */

.logo img{

width:168px;
max-width:85%;
margin-bottom:15px;

}

/* địa chỉ */

.address{

color:#555;
margin-bottom:25px;
font-size:14px;

}

/* tiêu đề */

.title{

font-size:22px;
margin-bottom:30px;
font-weight:600;

}

/* khu vực nút */

.buttons{

display:flex;
flex-direction:column;
gap:15px;

}

/* nút */

.btn{

padding:16px;
border-radius:12px;
font-size:18px;
font-weight:600;
cursor:pointer;
border:none;
transition:0.2s;

}

/* nút hài lòng */

.btn-happy{

background:#00BFFF;
color:white;

}

.btn-happy:hover{

transform:scale(1.05);

}

/* nút không hài lòng */

.btn-unhappy{

background:#f2f2f2;
color:#333;

}

.btn-unhappy:hover{

background:#e6e6e6;

}

.note{

margin-top:25px;
font-size:13px;
color:#666;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Logotachnen.png" alt="Lemon Laundry">
</div>

<div class="address">
Lemon Laundry _ 142 Dang Vu Hy
</div>

<div class="title">
How was your experience today?
</div>

<div class="buttons">

<button class="btn btn-happy" onclick="happy()">
😊 Very satisfied
</button>

<button class="btn btn-unhappy" onclick="unhappy()">
😐 Not satisfied
</button>

</div>

<div class="note">
Thank you for helping Lemon Laundry improve our service !
</div>

</div>

<script>

function happy(){

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

function unhappy(){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSdLFk4iY2hqkX3CKqZvdKmWuE9QdEFg1nhYfEhybII4ni6ccA/viewform?usp=dialog";

}

</script>

</body>

</html>
