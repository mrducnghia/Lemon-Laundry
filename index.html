<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Review</title>

<style>

*{
box-sizing:border-box;
}

body{

font-family:Arial, sans-serif;
margin:0;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

background-image:url("lemon.jpg");
background-size:cover;
background-position:center;

}

.overlay{

background:rgba(255,255,255,0.88);
padding:40px 25px;
border-radius:20px;

width:90%;
max-width:420px;

text-align:center;

box-shadow:0 10px 35px rgba(0,0,0,0.2);

}

.logo{

font-size:32px;
font-weight:bold;
color:#2ea3c6;
margin-bottom:10px;

}

.address{

font-size:14px;
color:#777;
margin-bottom:25px;

}

.title{

font-size:22px;
margin-bottom:25px;
font-weight:bold;

}

.stars{

margin-bottom:20px;

}

.stars span{

font-size:48px;
margin:5px;
cursor:pointer;

color:#2ea3c6;

transition:0.25s;

}

.stars span:hover{

transform:scale(1.25);

}

.note{

font-size:14px;
color:#777;

}

@media (max-width:480px){

.stars span{

font-size:42px;

}

}

</style>

</head>

<body>

<div class="overlay">

<div class="logo">
🍋 Lemon Laundry
</div>

<div class="address">
142 Dang Vu Hy
</div>

<div class="title">
Are you satisfied with our service?
</div>

<div class="stars">

<span onclick="rate(1)">★</span> <span onclick="rate(2)">★</span> <span onclick="rate(3)">★</span> <span onclick="rate(4)">★</span> <span onclick="rate(5)">★</span>

</div>

<div class="note">
Thank you for helping Lemon Laundry improve our service! ❤️
</div>

</div>

<script>

function rate(stars){

if(stars <=3){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSfQucXNqQpD7xyTg_6Q4zE8XOKr0HuMWQzPeawKJUI_WBIIbg/viewform";

}

else{

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

}

</script>

</body>

</html>
