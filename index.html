<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#00BFFF">

<title>Lemon Laundry Review</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;

background-image:url("nen.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin:0;
padding-top:60px;
}

.container{

background:#eaf6fb;
margin:20px;
padding:30px 20px;

border-radius:25px;

}

.logo img{

width:160px;
max-width:80%;
margin-bottom:10px;

}

.address{

color:#666;
margin-bottom:20px;
font-size:16px;

}

.title{

font-size:24px;
margin-bottom:25px;

}

.stars span{

font-size:77px;
cursor:pointer;
margin:8px;

color:#cccccc;

transition:0.2s;

}

.stars span:hover{

transform:scale(1.2);

}

.note{

margin-top:30px;
color:#777;
font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="logo.png" alt="Lemon Laundry">

</div>

<div class="address">
142 Đặng Vũ Hỷ
</div>

<div class="title">
Bạn hài lòng với dịch vụ của chúng tôi?
</div>

<div class="stars">

<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>

</div>

<div class="note">
Cảm ơn bạn đã giúp Lemon Laundry cải thiện dịch vụ ❤️
</div>

</div>

<script>

function rate(stars){

if(stars <=3){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSfQucXNqQpD7xyTg_6Q4zE8XOKr0HuMWQzPeawKJUI_WBIIbg/viewform";

}

else{

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

}

</script>

</body>

</html>
