<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00BFFF">

<title>Lemon Laundry Review</title>

<style>

body{

font-family: Arial, sans-serif;
text-align:center;

background-image:url("nen.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin:0;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

/* khung nội dung */

.container{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

padding:35px 30px;
border-radius:22px;

width:92%;
max-width:440px;

box-shadow:0 15px 40px rgba(0,0,0,0.18);

}

/* logo */

.logo img{

width:168px;
max-width:85%;
margin-bottom:15px;

}

/* địa chỉ */

.address{

color:#555;
margin-bottom:25px;
font-size:14px;

}

/* tiêu đề */

.title{

font-size:22px;
margin-bottom:25px;
font-weight:600;

}

/* khu vực sao */

.stars{

display:flex;
justify-content:center;
gap:10px;

font-size:42px;

}

/* sao */

.star{

color:#ddd;
cursor:pointer;
transition:0.2s;

}

/* hover */

.star:hover{

transform:scale(1.2);

}

/* sao active */

.star.active{

color:#00BFFF;

}

/* hiệu ứng rung */

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-3px);}
50%{transform:translateX(3px);}
75%{transform:translateX(-3px);}
100%{transform:translateX(0);}

}

.shake{

animation:shake 0.3s;

}

.note{

margin-top:25px;
font-size:13px;
color:#666;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Logotachnen.png" alt="Lemon Laundry">
</div>

<div class="address">
Lemon Laundry _ 142 Dang Vu Hy
</div>

<div class="title">
Are you satisfied with our service?
</div>

<div class="stars">

<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>

</div>

<div class="note">
Thank you for helping Lemon Laundry improve our service ❤️
</div>

</div>

<script>

const stars = document.querySelectorAll(".star");

stars.forEach((star,index)=>{

star.addEventListener("mouseenter",()=>{

highlightStars(index+1);

});

star.addEventListener("click",()=>{

rate(index+1);

});

});

function highlightStars(rating){

stars.forEach((s,i)=>{

if(i < rating){

s.classList.add("active");

}else{

s.classList.remove("active");

}

});

}

function rate(starsCount){

highlightStars(starsCount);

/* rung khi 5 sao */

if(starsCount === 5){

document.querySelector(".stars").classList.add("shake");

if(navigator.vibrate){

navigator.vibrate(80);

}

}

setTimeout(()=>{

if(starsCount <=3){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSdLFk4iY2hqkX3CKqZvdKmWuE9QdEFg1nhYfEhybII4ni6ccA/viewform?usp=dialog";

}else{

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

},600);

}

</script>

</body>

</html>
