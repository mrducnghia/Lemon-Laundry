<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Review</title>

<style>

body{

margin:0;
font-family: Arial, sans-serif;

background-image:url("lemon.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

/* khung trắng giữa màn hình */

.container{

background:rgba(255,255,255,0.9);
padding:35px 25px;
border-radius:18px;

text-align:center;

width:85%;
max-width:400px;

}

/* logo */

.logo{

font-size:32px;
font-weight:bold;
color:#f4b400;
margin-bottom:8px;

}

/* địa chỉ */

.address{

color:#777;
margin-bottom:25px;

}

/* tiêu đề */

.title{

font-size:22px;
margin-bottom:25px;

}

/* sao */

.stars span{

font-size:55px;
cursor:pointer;
margin:6px;
transition:0.2s;

}

.stars span:hover{

transform:scale(1.2);

}

/* ghi chú */

.note{

margin-top:25px;
color:#777;
font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🍋 Lemon Laundry
</div>

<div class="address">
142 Dang Vu Hy
</div>

<div class="title">
Are you satisfied with our service?
</div>

<div class="stars">

<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>

</div>

<div class="note">
Thank you for helping Lemon Laundry improve our service! ❤️
</div>

</div>

<script>

function rate(stars){

if(stars <=3){

window.location="https://docs.google.com/forms/d/e/1FAIpQLSfQucXNqQpD7xyTg_6Q4zE8XOKr0HuMWQzPeawKJUI_WBIIbg/viewform";

}

else{

window.location="https://g.page/r/CYkoFLwBqYWQEBM/review";

}

}

</script>

</body>

</html>
